name: Mark stale issues and pull requests

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch: # Allows the workflow to be manually triggered
  pull_request:
    branches:
    - main

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read

    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: 'This issue has been automatically marked as stale because it has not had recent activity. It will be closed if no further activity occurs.'
          stale-pr-message: 'This pull request has been automatically marked as stale because it has not had recent activity. It will be closed if no further activity occurs.'
          days-before-stale: 45 # Number of days of inactivity before marking as stale
          days-before-close: 15 # Number of days to wait before closing a stale issue/PR
          stale-issue-label: 'stale' # Label to apply to stale issues
          stale-pr-label: 'stale' # Label to apply to stale PRs
          exempt-issue-labels: 'pinned, security' # Labels to exempt from being marked as stale
          exempt-pr-labels: 'work-in-progress' # Labels to exempt from being marked as stale
